<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7s Soul Lab | 七秒靈魂實驗室</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            background: radial-gradient(circle at center, #0d1b2a 0%, #050a14 100%);
            color: #e0e1dd; font-family: "Microsoft JhengHei", sans-serif; min-height: 100vh;
        }
        .navbar { background: rgba(0, 0, 0, 0.8) !important; backdrop-filter: blur(15px); border-bottom: 1px solid rgba(248, 228, 160, 0.2); }
        .gold-title { color: #F8E4A0; text-shadow: 0 0 20px rgba(248, 228, 160, 0.5); letter-spacing: 2px; }
        .btn-lab {
            background: transparent; border: 2px solid #F8E4A0; color: #F8E4A0;
            border-radius: 50px; padding: 15px 50px; font-weight: bold; transition: all 0.4s ease;
        }
        .btn-lab:hover { background: rgba(248, 228, 160, 0.15); color: #fff; box-shadow: 0 0 30px rgba(248, 228, 160, 0.4); transform: scale(1.05); }
        .btn-lab:disabled { border-color: #444; color: #444; }
        .glass-card { background: rgba(255, 255, 255, 0.02); padding: 60px 40px; border-radius: 30px; border: 1px solid rgba(248, 228, 160, 0.1); }
        .scanning { animation: scan-glow 2s infinite; }
        @keyframes scan-glow { 0%, 100% { box-shadow: 0 0 10px rgba(248, 228, 160, 0.1); } 50% { box-shadow: 0 0 40px rgba(248, 228, 160, 0.3); } }
        .result-area { opacity: 0; transform: translateY(30px); transition: all 1s ease; }
        .result-area.show { opacity: 1; transform: translateY(0); }
        .badge-custom { padding: 8px 15px; border-radius: 10px; font-size: 0.9rem; margin-bottom: 10px; display: inline-block; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand gold-title fs-3" href="#">✨ 7s Soul Lab</a>
            <span class="navbar-text d-none d-sm-block">七秒靈魂實驗室 | 直覺讀心感應</span>
        </div>
    </nav>

    <div class="container text-center mt-5 pt-5">
        <div class="glass-card" id="main-container">
            <h1 class="gold-title mb-3">大天使神諭連線</h1>
            <p class="text-secondary mb-5">請在接下來的七秒鐘，放下雜念，與你的靈魂頻率共振。</p>
            <div id="display-box" class="fs-4 mb-5" style="min-height: 150px; display: flex; align-items: center; justify-content: center; flex-direction: column;">準備好開始感應了嗎？</div>
            <button class="btn-lab" id="start-btn" onclick="run7sExperiment()">啟動七秒靈魂實驗</button>
            <div id="result-area" class="result-area mt-4"></div>
        </div>
    </div>

    <footer class="text-center py-5 mt-5 opacity-50"><p>© 2026 7s Soul Lab | 讓靈魂在七秒內被聽見</p></footer>

    <script>
        function run7sExperiment() {
            const box = document.getElementById('display-box');
            const btn = document.getElementById('start-btn');
            const resultArea = document.getElementById('result-area');
            const container = document.getElementById('main-container');

            btn.disabled = true;
            container.classList.add('scanning');
            resultArea.classList.remove('show');
            
            let timer = 7;
            const countdown = setInterval(() => {
                box.innerHTML = `<div class="gold-title" style="font-size: 4rem;">${timer}</div><div class="text-info mt-2">靈魂頻率掃描中...</div>`;
                timer--;
                if (timer < 0) {
                    clearInterval(countdown);
                    container.classList.remove('scanning');
                    box.innerHTML = `<div class="spinner-grow text-warning"></div><br>解碼訊息中...`;
                    fetch('/draw').then(r => r.json()).then(data => {
                        setTimeout(() => {
                            box.innerHTML = "<span class='text-secondary'>—— 實驗結果已顯化 ——</span>";
                            resultArea.innerHTML = `
                                <h2 class="gold-title mb-2">${data.name}</h2>
                                <div class="mb-3">
                                    <span class="badge-custom bg-primary bg-opacity-25 text-info">#${data.theme}</span>
                                    <span class="badge-custom bg-warning bg-opacity-25 text-warning">能量水晶：${data.crystal}</span>
                                </div>
                                <div class="p-4 rounded-4" style="background: rgba(255,255,255,0.05); border: 1px dashed rgba(248,228,160,0.3);">
                                    <p class="fs-5 text-light text-start mb-0" style="line-height: 1.8;">${data.message}</p>
                                </div>`;
                            resultArea.classList.add('show');
                            btn.disabled = false;
                        }, 800); 
                    });
                }
            }, 1000);
        }
    </script>
</body>
</html>
